name: DoesTrack
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
targets:
  DoesTrack:
    type: application
    platform: iOS
    sources:
      - path: DoesTrack
    info:
      path: DoesTrack/Supporting/Info.plist
      properties:
        CFBundleDisplayName: DoesTrack
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        NSHealthShareUsageDescription: "DoesTrack reads Apple Health metrics such as weight, sleep, resting heart rate, blood pressure, steps, and active energy to show local wellness context next to your dose schedule."
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gp.doestrack
        PRODUCT_NAME: DoesTrack
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7GXNZJMGPD
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
          ENABLE_DEBUG_DYLIB: NO
    entitlements:
      path: DoesTrack/Supporting/DoesTrack.entitlements
      properties:
        com.apple.developer.healthkit: true
  DoesTrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DoesTrackUITests
    dependencies:
      - target: DoesTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gp.doestrack.uitests
        TEST_TARGET_NAME: DoesTrack
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DoesTrack:
    build:
      targets:
        DoesTrack: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
    test:
      config: Debug
      targets:
        - DoesTrackUITests
